

<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body {
            background-color: #f5f5f5;
        }
        .container {
            max-width: 500px;
            margin-top: 50px;
        }
        .card-panel {
            padding: 20px;
        }
        /* Estilo para el spinner */
        .loader {
            border: 4px solid #f3f3f3; /* Light grey */
            border-top: 4px solid #4CAF50; /* Green */
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 2s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-message {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            color: #555;
            margin-top: 20px;
        }
        .hide {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row">
        <div class="col s12">
            <div class="card-panel grey lighten-5 z-depth-1">
                <h4 class="center-align">Acceso Seguro</h4>

                <div id="validation-form-container">
                    <form id="validation-form">
                        <div class="input-field">
                            <input id="rut" type="text" class="validate" name="rut">
                            <label for="rut">RUT de la empresa</label>
                            <span id="rut-error" class="helper-text red-text"></span>
                        </div>
                        <div class="input-field">
                            <input id="email" type="email" class="validate" name="email">
                            <label for="email">Correo electrónico de contacto</label>
                            <span id="email-error" class="helper-text red-text"></span>
                        </div>
                        <button type="submit" id="submit-validation-button" class="btn waves-effect waves-light">Enviar Código</button>
                    </form>
                </div>

                <div id="otp-form-container" class="hide">
                    <form id="otp-form">
                        <p class="center-align">Se ha enviado un código de acceso a su correo.</p>
                        <div class="input-field">
                            <input id="otp" type="text" class="validate" name="otp">
                            <label for="otp">Ingrese el código de 6 dígitos</label>
                            <span id="otp-error" class="helper-text red-text"></span>
                        </div>
                        <button type="submit" id="submit-otp-button" class="btn waves-effect waves-light">Validar Código</button>
                    </form>
                </div>

                <div id="success-message-container" class="hide">
                    <p class="center-align">✅ Código validado con éxito. Redirigiendo...</p>
                </div>

                <div id="loading-indicator" class="loading-message hide">
                    <div class="loader"></div>
                    <span>Cargando datos...</span>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
<script>
    document.getElementById('validation-form').addEventListener('submit', function(event) {
        event.preventDefault();
        submitValidation();
    });

    document.getElementById('otp-form').addEventListener('submit', function(event) {
        event.preventDefault();
        submitOTP();
    });

    var userEmailGlobal = '';
    var userRutGlobal = '';

    function showLoading() {
        document.getElementById('loading-indicator').classList.remove('hide');
        document.getElementById('submit-validation-button').setAttribute('disabled', 'disabled');
        document.getElementById('submit-otp-button').setAttribute('disabled', 'disabled');
    }

    function hideLoading() {
        document.getElementById('loading-indicator').classList.add('hide');
        document.getElementById('submit-validation-button').removeAttribute('disabled');
        document.getElementById('submit-otp-button').removeAttribute('disabled');
    }

    function submitValidation() {
        var rutInput = document.getElementById('rut');
        var emailInput = document.getElementById('email');
        var rutError = document.getElementById('rut-error');
        var emailError = document.getElementById('email-error');
        
        userRutGlobal = rutInput.value.trim();
        userEmailGlobal = emailInput.value.trim();

        if (!userRutGlobal) {
            rutError.textContent = '❌ Por favor, ingrese el RUT de la empresa.';
        } else {
            rutError.textContent = '';
        }
        
        if (!userEmailGlobal || !isValidEmail(userEmailGlobal)) {
            emailError.textContent = '❌ Por favor, ingrese un correo electrónico válido.';
        } else {
            emailError.textContent = '';
        }

        if (rutError.textContent || emailError.textContent) {
            return;
        }

        showLoading();

        google.script.run
            .withSuccessHandler(function(response) {
                hideLoading();
                M.toast({html: response.message, classes: response.success ? 'green darken-1' : 'red darken-1'});
                if (response.success) {
                    document.getElementById('validation-form-container').classList.add('hide');
                    document.getElementById('otp-form-container').classList.remove('hide');
                }
            })
            .withFailureHandler(function(error) {
                hideLoading();
                M.toast({html: '❌ Error al conectar con el servidor. Intente de nuevo.', classes: 'red darken-1'});
            })
            .processEmail({rut: userRutGlobal, email: userEmailGlobal});
    }
    

    function submitOTP() {
        var otpInput = document.getElementById('otp');
        var otpError = document.getElementById('otp-error');
        var userOTP = otpInput.value.trim();

        if (!userOTP || userOTP.length !== 6) {
            otpError.textContent = '❌ El código debe ser de 6 dígitos.';
            return;
        } else {
            otpError.textContent = '';
        }

        showLoading();

        google.script.run
            .withSuccessHandler(function(response) {
                hideLoading();
                M.toast({html: response.message, classes: response.success ? 'green darken-1' : 'red darken-1'});
                if (response.success) {
                    document.getElementById('otp-form-container').classList.add('hide');
                    document.getElementById('success-message-container').classList.remove('hide');
                    
                    // Lógica para la redirección automática
                    if (response.redirect) {
                        window.location.href = response.redirect;
                    }
                }
            })
            .withFailureHandler(function(error) {
                hideLoading();
                M.toast({html: '❌ Error al conectar con el servidor. Intente de nuevo.', classes: 'red darken-1'});
            })
            .validateOTP({rut: userRutGlobal, email: userEmailGlobal, otp: userOTP});
    }

    function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }
</script>
//xd1
</body>
</html>
