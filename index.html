<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Acceso Seguro - ALO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { background-color: #f5f5f5; }
        .container { max-width: 500px; margin-top: 50px; }
        .card-panel { padding: 20px; border-radius: 8px; }
        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #d32f2f;
            border-radius: 50%; width: 24px; height: 24px;
            animation: spin 2s linear infinite; display: inline-block;
            vertical-align: middle; margin-right: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-message { display: flex; align-items: center; justify-content: center; font-size: 1.2em; color: #555; margin-top: 20px; }
        .hide { display: none !important; }
        .btn { width: 100%; background-color: #d32f2f !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="row">
        <div class="col s12">
            <div class="card-panel white z-depth-2">
                <h4 class="center-align" style="color: #333;">Acceso Seguro</h4>

                <div id="validation-form-container">
                    <form id="validation-form">
                        <div class="input-field">
                            <i class="material-icons prefix">assignment_ind</i>
                            <input id="rut" type="text" class="validate" name="rut" required>
                            <label for="rut">RUT de la empresa</label>
                            <span id="rut-error" class="helper-text red-text"></span>
                        </div>
                        <div class="input-field">
                            <i class="material-icons prefix">email</i>
                            <input id="email" type="email" class="validate" name="email" required>
                            <label for="email">Correo electrónico de contacto</label>
                            <span id="email-error" class="helper-text red-text"></span>
                        </div>
                        <button type="submit" id="submit-validation-button" class="btn waves-effect waves-light">Enviar Código</button>
                    </form>
                </div>

                <div id="otp-form-container" class="hide">
                    <form id="otp-form">
                        <p class="center-align">Se ha enviado un código de acceso a su correo.</p>
                        <div class="input-field">
                            <i class="material-icons prefix">lock</i>
                            <input id="otp" type="text" maxlength="6" class="validate" name="otp" required>
                            <label for="otp">Ingrese el código de 6 dígitos</label>
                            <span id="otp-error" class="helper-text red-text"></span>
                        </div>
                        <button type="submit" id="submit-otp-button" class="btn waves-effect waves-light">Validar Código</button>
                    </form>
                </div>

                <div id="success-message-container" class="hide">
                    <div class="center-align">
                        <i class="material-icons large green-text">check_circle</i>
                        <p style="font-size: 1.2rem;">Código validado con éxito. Redirigiendo...</p>
                    </div>
                </div>

                <div id="loading-indicator" class="loading-message hide">
                    <div class="loader"></div>
                    <span>Procesando...</span>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
<script>
    // --- CONFIGURACIÓN DE URLS ---
    const URL_SOLICITAR_OTP = "https://ampuero777.app.n8n.cloud/webhook-test/request-otp";
    const URL_VALIDAR_OTP = "https://ampuero777.app.n8n.cloud/webhook-test/validar-otp-alo"; 

    let userEmailGlobal = '';
    let userRutGlobal = '';

    document.getElementById('validation-form').addEventListener('submit', function(event) {
        event.preventDefault();
        submitValidation();
    });

    document.getElementById('otp-form').addEventListener('submit', function(event) {
        event.preventDefault();
        submitOTP();
    });

    function showLoading() {
        document.getElementById('loading-indicator').classList.remove('hide');
        document.getElementById('submit-validation-button').disabled = true;
        document.getElementById('submit-otp-button').disabled = true;
    }

    function hideLoading() {
        document.getElementById('loading-indicator').classList.add('hide');
        document.getElementById('submit-validation-button').disabled = false;
        document.getElementById('submit-otp-button').disabled = false;
    }

    async function submitValidation() {
        const rutInput = document.getElementById('rut');
        const emailInput = document.getElementById('email');
        
        userRutGlobal = rutInput.value.trim();
        userEmailGlobal = emailInput.value.trim();

        showLoading();

        try {
            const response = await fetch(URL_SOLICITAR_OTP, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ rut: userRutGlobal, email: userEmailGlobal })
            });

            const data = await response.json();
            hideLoading();

            if (data.success) {
                M.toast({html: '✅ Código enviado a su email.', classes: 'green darken-1'});
                document.getElementById('validation-form-container').classList.add('hide');
                document.getElementById('otp-form-container').classList.remove('hide');
            } else {
                M.toast({html: '❌ ' + (data.message || 'Error en el sistema.'), classes: 'red darken-1'});
            }
        } catch (error) {
            hideLoading();
            M.toast({html: '❌ Error de conexión con n8n.', classes: 'red darken-1'});
        }
    }

    async function submitOTP() {
        const otpInput = document.getElementById('otp');
        const userOTP = otpInput.value.trim();

        if (userOTP.length !== 6) {
            M.toast({html: 'El código debe ser de 6 dígitos', classes: 'orange'});
            return;
        }

        showLoading();

        try {
            const response = await fetch(URL_VALIDAR_OTP, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    rut: userRutGlobal, 
                    email: userEmailGlobal, 
                    otp: userOTP 
                })
            });

            const data = await response.json();
            hideLoading();

            if (data.success) {
                M.toast({html: '✅ Acceso concedido', classes: 'green darken-1'});
                document.getElementById('otp-form-container').classList.add('hide');
                document.getElementById('success-message-container').classList.remove('hide');
                
                setTimeout(() => {
                    // Redirección final
                    window.location.href = `formulario.html?rut=${userRutGlobal}&email=${encodeURIComponent(userEmailGlobal)}`;
                }, 1500);
            } else {
                M.toast({html: '❌ ' + (data.message || 'Código incorrecto.'), classes: 'red darken-1'});
            }
        } catch (error) {
            hideLoading();
            M.toast({html: '❌ Error al validar código.', classes: 'red darken-1'});
        }
    }
</script>
</body>
</html>
